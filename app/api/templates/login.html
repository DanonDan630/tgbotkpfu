<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Админ панель</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h1>Вход в админ панель</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input type="text" id="username" name="username" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Войти</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('admin_token')) {
            window.location.href = '/admin/dashboard';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            messageDiv.innerHTML = 'Проверка...';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('admin_token', data.token);
                    messageDiv.innerHTML = '<span class="success">Успешно! Перенаправление...</span>';
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 500);
                } else {
                    messageDiv.innerHTML = '<span class="error">Ошибка: ' + (data.detail || 'Неверный логин/пароль') + '</span>';
                }
            } catch (err) {
                messageDiv.innerHTML = '<span class="error">Ошибка подключения</span>';
            }
        });
    </script>
</body>
</html>
